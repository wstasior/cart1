<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>📷</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    width: 100dvw;
    height: 100dvh;
    overflow: hidden;
    cursor: pointer;
  }

  img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.4s ease;
  }
</style>
</head>
<body>
<img id="photo" src="" alt="" />

<script>
  // ─────────────────────────────────────────────────
  const GITHUB_USER = "wstasior";  // ← change this
  const GITHUB_REPO = "cart1";     // ← change if needed
  const IMAGES_DIR  = "images";
  const BRANCH      = "main";
  // ─────────────────────────────────────────────────

  const IMAGE_EXTS = /\.(jpe?g|png|gif|webp|avif)$/i;
  let files = [];
  let currentIdx = -1;
  const el = document.getElementById("photo");

  async function init() {
    const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${IMAGES_DIR}?ref=${BRANCH}`, {
      headers: { Accept: "application/vnd.github+json" }
    });
    const data = await res.json();
    files = data.filter(f => f.type === "file" && IMAGE_EXTS.test(f.name));
    if (files.length) shuffle();
  }

  function shuffle() {
    let next;
    do { next = Math.floor(Math.random() * files.length); }
    while (files.length > 1 && next === currentIdx);
    currentIdx = next;
    el.style.opacity = 0;
    el.onload = () => el.style.opacity = 1;
    el.src = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/${IMAGES_DIR}/${files[currentIdx].name}`;
  }

  document.body.addEventListener("click", () => { if (files.length) shuffle(); });

  init();
</script>
</body>
</html>
